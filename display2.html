    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;

      overflow: hidden;
    }

    #scaler {
      position: fixed;
      top: 0; left: 0;
      transform-origin: top left;
    }

    :root {
      --orange: #f97316;
      --orange-dark: #ea580c;
      --gold: #fbbf24;
      --darker: #111;
      --dark: #1a1a1a;
      --surface: #222;
      --surface-light: #2a2a2a;
      --light: #f8f8f8;
      --muted: #888;
    }

    .display {
      width: 1920px;
      height: 1080px;
      background: var(--darker);
      color: var(--light);
      font-family: 'Inter', system-ui, sans-serif;
      position: relative;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .display * { box-sizing: border-box; }
    .bn { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.04em; }

    .kicker {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--orange);
      font-size: 16px;
    }

    .allergen {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.35);

    .food-ph {
      position: relative;
      background:

          rgba(249,115,22,0.10) 0 12px,
          rgba(249,115,22,0.04) 12px 24px),

      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.4);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-align: center;
      padding: 12px;
    }
    .food-ph::after {
      content: "";
      position: absolute; inset: 8px;
      border: 1px dashed rgba(255,255,255,0.08);
      border-radius: 10px;
      pointer-events: none;
    }
    .food-ph span { position: relative; z-index: 1; max-width: 80%; }

    @keyframes ehso-fade-up {
      from { opacity: 0; transform: translateY(28px) scale(0.985); filter: blur(4px); }
      to   { opacity: 1; transform: none;                          filter: blur(0); }
    }
    @keyframes ehso-fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes ehso-slide-right {
      from { opacity: 0; transform: translateX(-32px); filter: blur(3px); }
      to   { opacity: 1; transform: none;              filter: blur(0); }
    }
    @keyframes ehso-glow {
      0%, 100% { opacity: 0.45; transform: scale(1)    translate3d(0,0,0); }
      50%      { opacity: 0.78; transform: scale(1.08) translate3d(10px,-6px,0); }
    }
    @keyframes ehso-pulse-dot {
      0%, 100% { box-shadow: 0 0 0 0 rgba(249,115,22,0.55), 0 0 6px rgba(249,115,22,0.6); }
      50%      { box-shadow: 0 0 0 7px rgba(249,115,22,0),    0 0 10px rgba(249,115,22,0.85); }
    }
    @keyframes ehso-float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-4px); }
    }
    @keyframes ehso-shine {
      0%   { transform: translateX(-160%) skewX(-14deg); }
      100% { transform: translateX(280%)  skewX(-14deg); }
    }
    @keyframes ehso-grid-drift {
      from { background-position: 0 0,        0 0; }
      to   { background-position: 64px 64px,  64px 64px; }
    }
    @keyframes ehso-title-in {
      0%   { opacity: 0; transform: translateY(22px); letter-spacing: 22px; filter: blur(6px); }
      55%  { opacity: 1; }
      100% { opacity: 1; transform: none;             letter-spacing: 6px;  filter: blur(0); }
    }
    @keyframes ehso-stage-in {
      0%   { opacity: 0; transform: translateY(10px); filter: blur(6px); }
      100% { opacity: 1; transform: none;             filter: blur(0); }
    }

    .ehso-shine-host { position: relative; overflow: hidden; }
    .ehso-shine-host::after {
      content: "";
      position: absolute;
      top: -30%; bottom: -30%; left: 0; width: 35%;
      background: linear-gradient(100deg,
        rgba(255,255,255,0)    0%,
        rgba(255,255,255,0.06) 40%,
        rgba(255,255,255,0.22) 50%,
        rgba(255,255,255,0.06) 60%,
        rgba(255,255,255,0)    100%);
      transform: translateX(-160%) skewX(-14deg);
      animation: ehso-shine 6.5s ease-in-out 1.2s infinite;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    @media (prefers-reduced-motion: reduce) {
      .display *, .display *::before, .display *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>

    /* ── Viewport scaler ── */
    function scaleToFit() {
      const W = 1920, H = 1080;
      const sw = window.innerWidth  / W;
      const sh = window.innerHeight / H;
      const s  = Math.min(sw, sh);
      const el = document.getElementById('scaler');
      el.style.width  = W + 'px';
      el.style.height = H + 'px';
      el.style.transform = `scale(${s})`;
      const ox = (window.innerWidth  - W * s) / 2;
      const oy = (window.innerHeight - H * s) / 2;
      el.style.left = ox + 'px';
      el.style.top  = oy + 'px';
    }
    scaleToFit();
    window.addEventListener('resize', scaleToFit);

    /* F = toggle fullscreen */
    document.addEventListener('keydown', (e) => {
      if (e.key === 'f' || e.key === 'F') {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
        else document.exitFullscreen().catch(() => {});
      }
    });

                  display: 'flex', alignItems: 'baseline', gap: 12,
                  padding: '10px 0',
                  borderBottom: i < crepes.length - 1 ? '1px solid rgba(255,255,255,0.05)' : 'none',
                  animation: `ehso-fade-up 0.5s cubic-bezier(0.22,1,0.36,1) both`,
                  animationDelay: `${i * 0.05}s`,
                }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <span className="bn" style={{ fontSize: 26, letterSpacing: 1 }}>{c.name}</span>
                    <span className="allergen" style={{ marginLeft: 8, fontSize: 10 }}>({c.allergens})</span>
                  </div>
                  <span className="price-eur" style={{ fontSize: 28, color: 'var(--orange)' }}>{c.price}<span className="eur">€</span></span>
                </div>
              ))}
            </div>
          </div>

          {/* Drinks */}
          <div style={{
            background: 'var(--surface)', border: '1px solid rgba(255,255,255,0.05)',
            borderRadius: 16, padding: 28, display: 'flex', flexDirection: 'column',
            animation: 'ehso-fade-up 0.7s cubic-bezier(0.22,1,0.36,1) both 0.1s',
          }}>
            <div className="kicker" style={{ marginBottom: 4 }}>Inkl. Pfand</div>
            <h2 className="bn" style={{ fontSize: 56, margin: '0 0 18px', letterSpacing: 3, lineHeight: 1 }}>GETRÄNKE</h2>
            <div style={{
              display: 'grid', gridTemplateColumns: '1fr 100px 100px',
              paddingBottom: 10, marginBottom: 10,
              borderBottom: '2px solid rgba(249,115,22,0.4)',
            }}>
              <div />
              <div className="bn" style={{ fontSize: 24, color: 'var(--orange)', letterSpacing: 2, textAlign: 'right' }}>0,33L</div>
              <div className="bn" style={{ fontSize: 24, color: 'var(--orange)', letterSpacing: 2, textAlign: 'right' }}>1,0L</div>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', flex: 1, justifyContent: 'space-between' }}>
              {drinks.map((d, i) => (
                <div key={d.name} style={{
                  display: 'grid', gridTemplateColumns: '1fr 100px 100px', alignItems: 'baseline',
                  padding: '8px 0',
                  borderBottom: i < drinks.length - 1 ? '1px solid rgba(255,255,255,0.04)' : 'none',
                  animation: `ehso-fade-up 0.5s cubic-bezier(0.22,1,0.36,1) both`,
                  animationDelay: `${0.1 + i * 0.05}s`,
                }}>
                  <div>
                    <span className="bn" style={{ fontSize: 24, letterSpacing: 1 }}>{d.name}</span>
                    {d.note && <span style={{ color: 'var(--muted)', fontSize: 11, marginLeft: 8 }}>· {d.note}</span>}
                  </div>
                  <div className="price-eur" style={{ fontSize: 22, textAlign: 'right' }}>{d.price033}<span className="eur">€</span></div>
                  <div className="price-eur" style={{ fontSize: 22, textAlign: 'right', color: d.price1 === '—' ? 'var(--muted)' : 'var(--light)' }}>
                    {d.price1 === '—' ? '—' : <>{d.price1}<span className="eur">€</span></>}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* ── Main display ── */
    function Display2() {
      const pages = ['croque', 'wraps', 'sweets-drinks'];
      const [page, setPage] = useState(0);

      useEffect(() => {
        const t = setInterval(() => setPage(p => (p + 1) % pages.length), 12000);
        return () => clearInterval(t);
      }, []);

      const titles = { croque: 'CROQUE', wraps: 'WRAPS', 'sweets-drinks': 'CRÊPES' };
      const subs   = {
        croque: 'Mini · Normal · Maxi · 18 / 26 / 36 cm',
        wraps: 'Mit Eisberg & Sauce',
        'sweets-drinks': 'Crêpes & Getränke',
      };

      return (
        <div className="display">
          <ProBg />
          <ProHeader title={titles[pages[page]]} sub={subs[pages[page]]} index={page + 1} of={pages.length} />
          <div key={page} style={{
            position: 'absolute', left: STAGE_PAD_X, right: STAGE_PAD_X, top: STAGE_TOP, height: STAGE_H,
            animation: 'ehso-stage-in 0.85s cubic-bezier(0.22,1,0.36,1) both',
            willChange: 'transform, filter, opacity',
          }}>
            {pages[page] === 'croque'        && <CroqueStage />}
            {pages[page] === 'wraps'         && <WrapsStage />}
            {pages[page] === 'sweets-drinks' && <SweetsDrinksStage />}
          </div>
          <ProFooter pages={pages.length} active={page} note="Getränke inkl. Pfand" />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Display2 />);
  </script>
</body>
</html>
