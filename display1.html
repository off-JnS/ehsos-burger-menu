<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Ehso's Burger — Display 1 · Burger &amp; Sides</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #050505;
      overflow: hidden;
    }

    /* Scale the 1920×1080 display to fill whatever viewport the browser gives us */
    #scaler {
      position: fixed;
      top: 0; left: 0;
      transform-origin: top left;
    }

    /* ── Brand design tokens ── */
    :root {
      --orange: #f97316;
      --orange-dark: #ea580c;
      --gold: #fbbf24;
      --darker: #111;
      --dark: #1a1a1a;
      --surface: #222;
      --surface-light: #2a2a2a;
      --light: #f8f8f8;
      --muted: #888;
    }

    .display {
      width: 1920px;
      height: 1080px;
      background: var(--darker);
      color: var(--light);
      font-family: 'Inter', system-ui, sans-serif;
      position: relative;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .display * { box-sizing: border-box; }
    .bn { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.04em; }

    .kicker {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--orange);
      font-size: 16px;
    }

    .allergen {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.35);
      text-transform: lowercase;
    }

    .price-eur { font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; }
    .price-eur .eur { font-size: 0.55em; opacity: 0.7; margin-left: 6px; vertical-align: baseline; }

    .food-ph {
      position: relative;
      background:
        repeating-linear-gradient(45deg,
          rgba(249,115,22,0.10) 0 12px,
          rgba(249,115,22,0.04) 12px 24px),
        radial-gradient(circle at 30% 30%, rgba(249,115,22,0.18), transparent 60%),
        #1a1a1a;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.4);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-align: center;
      padding: 12px;
    }
    .food-ph::after {
      content: "";
      position: absolute; inset: 8px;
      border: 1px dashed rgba(255,255,255,0.08);
      border-radius: 10px;
      pointer-events: none;
    }
    .food-ph span { position: relative; z-index: 1; max-width: 80%; }

    @keyframes ehso-fade-up {
      from { opacity: 0; transform: translateY(28px) scale(0.985); filter: blur(4px); }
      to   { opacity: 1; transform: none;                          filter: blur(0); }
    }
    @keyframes ehso-fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes ehso-slide-right {
      from { opacity: 0; transform: translateX(-32px); filter: blur(3px); }
      to   { opacity: 1; transform: none;              filter: blur(0); }
    }
    @keyframes ehso-glow {
      0%, 100% { opacity: 0.45; transform: scale(1)    translate3d(0,0,0); }
      50%      { opacity: 0.78; transform: scale(1.08) translate3d(10px,-6px,0); }
    }
    @keyframes ehso-pulse-dot {
      0%, 100% { box-shadow: 0 0 0 0 rgba(249,115,22,0.55), 0 0 6px rgba(249,115,22,0.6); }
      50%      { box-shadow: 0 0 0 7px rgba(249,115,22,0),    0 0 10px rgba(249,115,22,0.85); }
    }
    @keyframes ehso-float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-4px); }
    }
    @keyframes ehso-shine {
      0%   { transform: translateX(-160%) skewX(-14deg); }
      100% { transform: translateX(280%)  skewX(-14deg); }
    }
    @keyframes ehso-grid-drift {
      from { background-position: 0 0,        0 0; }
      to   { background-position: 64px 64px,  64px 64px; }
    }
    @keyframes ehso-title-in {
      0%   { opacity: 0; transform: translateY(22px); letter-spacing: 22px; filter: blur(6px); }
      55%  { opacity: 1; }
      100% { opacity: 1; transform: none;             letter-spacing: 6px;  filter: blur(0); }
    }
    @keyframes ehso-stage-in {
      0%   { opacity: 0; transform: translateY(10px); filter: blur(6px); }
      100% { opacity: 1; transform: none;             filter: blur(0); }
    }

    .ehso-shine-host { position: relative; overflow: hidden; }
    .ehso-shine-host::after {
      content: "";
      position: absolute;
      top: -30%; bottom: -30%; left: 0; width: 35%;
      background: linear-gradient(100deg,
        rgba(255,255,255,0)    0%,
        rgba(255,255,255,0.06) 40%,
        rgba(255,255,255,0.22) 50%,
        rgba(255,255,255,0.06) 60%,
        rgba(255,255,255,0)    100%);
      transform: translateX(-160%) skewX(-14deg);
      animation: ehso-shine 6.5s ease-in-out 1.2s infinite;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    @media (prefers-reduced-motion: reduce) {
      .display *, .display *::before, .display *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>

    <div id="root"></div>

        { name: "Cheese Burger",    price: "9,00",  allergens: "a,d,g,l,m", desc: "Beef 150g, Cheddar, karamellisierte Zwiebeln, frische Tomaten und Gewürzgurken" },
        { name: "Double Cheese",    price: "11,00", allergens: "a,d,g,l,m", desc: "2× Beef 150g, Cheddar, karamellisierte Zwiebeln, frische Tomaten und Gewürzgurken" },

      familyBoxes: [

        { name: "Box 3", price: "58,00", contents: ["2× Burger nach Wahl","2× Croque Mini","2× Wraps","2 Crepes","1L Softdrink"] },
      ],
    };

    /* ── Viewport scaler ── */
    function scaleToFit() {
      const W = 1920, H = 1080;
      const sw = window.innerWidth  / W;
      const sh = window.innerHeight / H;
      const s  = Math.min(sw, sh);
      const el = document.getElementById('scaler');
      el.style.width  = W + 'px';
      el.style.height = H + 'px';
      el.style.transform = `scale(${s})`;
      // Centre horizontally/vertically
      const ox = (window.innerWidth  - W * s) / 2;
      const oy = (window.innerHeight - H * s) / 2;
      el.style.left = ox + 'px';
      el.style.top  = oy + 'px';
    }
    scaleToFit();
    window.addEventListener('resize', scaleToFit);

    /* F = toggle fullscreen */
    document.addEventListener('keydown', (e) => {
      if (e.key === 'f' || e.key === 'F') {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
        else document.exitFullscreen().catch(() => {});
      }
    });
  </script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const STAGE_PAD_X  = 64;
    const STAGE_TOP    = 220;
    const STAGE_BOTTOM = 988;
    const STAGE_H      = STAGE_BOTTOM - STAGE_TOP; // 768

    /* ── Shared chrome ── */
    function ProBg() {
      return (
        <>
          <div style={{
            position: 'absolute', inset: 0,

                  </div>
                </div>
              ))}
            </div>
          </SidesPanel>

          {/* Saucen */}
          <SidesPanel kicker="Extra · je 1,50 €" title="SAUCEN">
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8, flex: 1, justifyContent: 'space-between' }}>
              {saucen.map((s, i) => (
                <div key={s} style={{
                  display: 'flex', alignItems: 'center', gap: 12,
                  padding: '6px 0',
                  borderBottom: i < saucen.length - 1 ? '1px solid rgba(255,255,255,0.04)' : 'none',
                  animation: `ehso-fade-up 0.5s cubic-bezier(0.22,1,0.36,1) both`,
                  animationDelay: `${i * 0.03}s`,
                }}>
                  <span style={{ width: 6, height: 6, background: 'var(--orange)', borderRadius: '50%', flexShrink: 0 }} />
                  <span className="bn" style={{ fontSize: 20, letterSpacing: 1, flex: 1 }}>{s}</span>
                </div>
              ))}
            </div>
          </SidesPanel>
        </div>
      );
    }

    function SidesPanel({ kicker, title, children }) {
      return (
        <div style={{
          background: 'var(--surface)', borderRadius: 16, padding: 22,
          border: '1px solid rgba(255,255,255,0.05)',
          display: 'flex', flexDirection: 'column',
          animation: 'ehso-fade-up 0.7s cubic-bezier(0.22,1,0.36,1) both',
        }}>
          <div className="kicker" style={{ marginBottom: 4, fontSize: 12 }}>{kicker}</div>
          <h2 className="bn" style={{ fontSize: 44, margin: '0 0 16px', letterSpacing: 3, lineHeight: 1 }}>{title}</h2>
          {children}
        </div>
      );
    }

    /* ── Main display ── */
    function Display1() {
      const pages = ['burgers', 'sides'];
      const [page, setPage] = useState(0);

      useEffect(() => {
        const t = setInterval(() => setPage(p => (p + 1) % pages.length), 12000);
        return () => clearInterval(t);
      }, []);

      const titles = { burgers: 'BURGER', sides: 'SIDES' };
      const subs   = { burgers: 'Halal · Hausgemacht · Frisch', sides: 'Snacks · Family Boxes · Saucen' };

      return (
        <div className="display">
          <ProBg />
          <ProHeader title={titles[pages[page]]} sub={subs[pages[page]]} index={page + 1} of={pages.length} />
          <div key={page} style={{
            position: 'absolute', left: STAGE_PAD_X, right: STAGE_PAD_X, top: STAGE_TOP, height: STAGE_H,
            animation: 'ehso-stage-in 0.85s cubic-bezier(0.22,1,0.36,1) both',
            willChange: 'transform, filter, opacity',
          }}>
            {pages[page] === 'burgers' && <BurgerStage />}
            {pages[page] === 'sides'   && <SidesStage />}
          </div>
          <ProFooter pages={pages.length} active={page} note="Als Menü +6,00 €" />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Display1 />);
  </script>
</body>
</html>
